# .github/release.yml
# GitHub 自動生成リリースノートの設定
# https://docs.github.com/ja/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: "💥 Breaking Changes"
      labels:
        - breaking-change
    - title: "🚀 New Features"
      labels:
        - enhancement
        - feature
        - "*"
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "🔒 Security"
      labels:
        - security
        - vulnerability
    - title: "📦 Dependencies"
      labels:
        - dependencies
    - title: "📝 Documentation"
      labels:
        - documentation
        - docs
    - title: "🔧 Maintenance"
      labels:
        - chore
        - maintenance
        - refactor
    - title: "🧪 Tests"
      labels:
        - test
        - testing
