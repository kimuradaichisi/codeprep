name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  package-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Package VSIX
        run: ./node_modules/.bin/vsce package --no-dependencies

      - name: Upload VSIX to Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          token: ${{ secrets.GITHUB_TOKEN }}
